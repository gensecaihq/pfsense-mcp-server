services:
  pfsense-mcp:
    build: .
    image: pfsense-mcp:latest
    container_name: pfsense-mcp-server
    restart: unless-stopped
    ports:
      - "${MCP_PORT:-3000}:3000"
    environment:
      # pfSense connection
      PFSENSE_URL: ${PFSENSE_URL}
      PFSENSE_VERSION: ${PFSENSE_VERSION:-CE_2_8_0}
      AUTH_METHOD: ${AUTH_METHOD:-api_key}
      PFSENSE_API_KEY: ${PFSENSE_API_KEY:-}
      PFSENSE_USERNAME: ${PFSENSE_USERNAME:-}
      PFSENSE_PASSWORD: ${PFSENSE_PASSWORD:-}
      VERIFY_SSL: ${VERIFY_SSL:-true}
      # MCP bearer token auth (required for HTTP mode)
      MCP_API_KEY: ${MCP_API_KEY}
      # Transport mode (must match command arg for healthcheck)
      MCP_TRANSPORT: streamable-http
    command: ["-t", "streamable-http"]
    volumes:
      - ./logs:/logs:rw
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://127.0.0.1:3000/mcp')"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
